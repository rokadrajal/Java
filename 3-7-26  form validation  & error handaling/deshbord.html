<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        img {
            width: 100%;
            height: 100vh;
        }
        .btn1{
            position: absolute;
            top: 50%;
            left: 3%;
            padding: 10px;
            border: none;
            border-radius: 3px;
        }
        .btn2{
            position: absolute;
            top: 50%;
            left: 95%;
            padding: 10px;
            border: none;
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <div>
        <img src="img1.jpg" alt="">
        <button class="btn1"><i class="fa-solid fa-angle-left" style="color: rgb(0, 0, 0);"></i></button>
        <button class="btn2"><i class="fa-solid fa-angle-right" style="color: rgb(0, 0, 0);"></i></button>

    </div>

    <script>

        let images = ["img1.jpg","img2.jpg","img3.jpg"];
        var index = 1;
        document.body.onclick = function () {
            document.querySelector('.btn1').onclick = function () {

                if (index > 0 ) {
                    index--;
                }
                else
                {
                    index = images.length;
                }
                document.querySelector('img').attributes.src.value = `${images[index]}`;

            }

            document.querySelector('.btn2').onclick = function () {

                if (index < images.length - 1) {
                    index++;
                }
                else
                {
                    index = 0;
                }
                document.querySelector('img').attributes.src.value = `${images[index]}`;

            }

        }

    </script>

</body>

</html>
